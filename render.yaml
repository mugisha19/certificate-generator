# Render Blueprint — Dockerised .NET 8 web service for the AUCA Certify app.
#
# Postgres is NOT provisioned by this Blueprint (Render's free tier allows
# only one free DB per account). After applying the Blueprint, fill in the
# DB_* env vars in the Render dashboard with credentials from any Postgres
# you already have:
#
#   • An existing Render free Postgres (Connect → Internal Database URL fields), or
#   • An external Postgres (Neon, Supabase, ElephantSQL, Aiven, …)
#
# The app composes a Npgsql connection string from these vars at boot.

services:
  - type: web
    name: certificate-generator
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: Postgres

      # ── Postgres credentials — fill these in via the Render dashboard ──
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
