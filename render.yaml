# Render Blueprint — provisions a free Postgres database and a Dockerised
# .NET 8 web service running the AUCA Certify app.
#
# Edit the `name` fields below if they collide with services you already own
# in your Render account.

services:
  - type: web
    name: certificate-generator
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: Postgres
      # Postgres credentials are wired straight from the database resource below.
      - key: DB_HOST
        fromDatabase:
          name: certificate-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: certificate-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: certificate-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: certificate-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: certificate-db
          property: password

databases:
  - name: certificate-db
    databaseName: certificate
    user: certificate
    plan: free
    region: oregon
