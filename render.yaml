# Render Blueprint — provisions a free Postgres database and a Dockerised
# .NET 8 web service running the AUCA Certify app.
#
# The DB connection is wired through a single DATABASE_URL env var
# (postgres:// URL). Program.cs parses it into an SSL-enabled Npgsql
# connection string at boot.

services:
  - type: web
    name: certificate-generator
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: Postgres
      - key: DATABASE_URL
        fromDatabase:
          name: certificate-db
          property: connectionString

databases:
  - name: certificate-db
    databaseName: certificate
    user: certificate
    plan: free
    region: oregon
